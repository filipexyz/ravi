<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ravi Overlay — Servers</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0d;
        --panel: #111111;
        --panel-2: #161616;
        --border: #1f1f1f;
        --border-hover: #2c2c2c;
        --text: #f2f0f4;
        --muted: #8d8794;
        --accent: #820ad1;
        --accent-hover: #9b2ee6;
        --accent-dim: rgba(130, 10, 209, 0.14);
        --danger: #ff5f57;
        --success: #32d583;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        max-width: 560px;
        padding: 32px;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      header { margin-bottom: 28px; }
      header h1 {
        margin-bottom: 4px;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0;
      }
      header p { color: var(--muted); font-size: 12px; }
      header p code {
        padding: 1px 5px;
        border-radius: 4px;
        background: var(--accent-dim);
        color: #d8b4fe;
        font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .section { margin-bottom: 20px; }
      .section h2 {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .servers { list-style: none; }
      .servers li {
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 6px;
        background: var(--panel);
        transition:
          background 120ms ease,
          border-color 120ms ease;
      }
      .servers li:hover { border-color: var(--border-hover); }
      .servers li.active {
        border-color: rgba(130, 10, 209, 0.72);
        background: var(--panel-2);
      }
      .server-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .server-name { font-size: 13px; font-weight: 600; }
      .server-meta { margin-top: 3px; color: var(--muted); font-size: 11px; }
      .server-meta code {
        padding: 1px 4px;
        border-radius: 3px;
        background: var(--panel-2);
        font: 10px ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .server-actions { display: flex; gap: 4px; flex-wrap: wrap; }
      button {
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          color 120ms ease;
      }
      button:hover { border-color: var(--border-hover); color: var(--text); }
      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        font-weight: 600;
      }
      button.primary:hover {
        border-color: var(--accent-hover);
        background: var(--accent-hover);
      }
      button.danger { border-color: transparent; color: var(--danger); }
      button.danger:hover { border-color: rgba(255, 95, 87, 0.45); }
      hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
      .field { display: flex; flex-direction: column; gap: 5px; }
      .field label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }
      input[type="text"], input[type="url"], input[type="password"] {
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--panel-2);
        color: var(--text);
        font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: border-color 120ms ease;
      }
      input:focus { border-color: var(--accent); outline: none; }
      input::placeholder { color: #62596b; }
      .form-actions { display: flex; gap: 8px; margin-top: 14px; }
      .empty { padding: 16px 0; color: var(--muted); font-size: 12px; text-align: center; }
      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        transform: translateY(6px);
        opacity: 0;
        pointer-events: none;
        transition: all 180ms ease;
      }
      .toast.visible { transform: translateY(0); opacity: 1; }
      .toast.ok { border-color: var(--accent); }
      .toast.err { border-color: var(--danger); }
      .reveal-key { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
      .reveal-toggle { font-size: 11px; color: var(--accent); background: none; border: none; padding: 0 0 0 6px; cursor: pointer; }
      .reveal-toggle:hover { opacity: 0.82; }
    </style>
  </head>
  <body>
    <header>
      <h1>Ravi Overlay</h1>
      <p>Servidores gateway conectados. Gere uma chave com <code>ravi context issue overlay-extension --inherit --ttl 1d</code> e adicione abaixo.</p>
    </header>

    <section class="section">
      <h2>Servidores</h2>
      <ul id="servers" class="servers"></ul>
      <p id="empty" class="empty" hidden>No servers configured yet.</p>
    </section>

    <section class="section">
      <hr>
      <h2 id="form-title">Adicionar servidor</h2>
      <form id="server-form">
        <div class="row">
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="local" required />
          </div>
          <div class="field">
            <label for="baseUrl">Gateway base URL</label>
            <input type="url" id="baseUrl" name="baseUrl" placeholder="http://127.0.0.1:4211" required />
          </div>
        </div>
        <div class="field">
          <label for="contextKey">Context key (rctx_…)</label>
          <input type="password" id="contextKey" name="contextKey" placeholder="rctx_…" required autocomplete="off" />
        </div>
        <div class="form-actions">
          <button type="submit" class="primary" id="save-btn">Save</button>
          <button type="button" id="cancel-btn" hidden>Cancel</button>
        </div>
      </form>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="options.js"></script>
  </body>
</html>
