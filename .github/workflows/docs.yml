name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Export docs
        run: |
          cd docs
          mkdir -p .mintlify
          npx mintlify@4.2.549 export --output .mintlify/output.zip
          rm -rf .mintlify/output
          mkdir -p .mintlify/output
          unzip -q .mintlify/output.zip -d .mintlify/output

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.mintlify/output --project-name=ravi-docs
